# =============================================================================
# Sprite Digital Being - Docker Compose Configuration
# Production-ready setup with PostgreSQL, Redis, and Sprite application
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Sprite Application Service
  # ---------------------------------------------------------------------------
  sprite-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sprite-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Spring Boot configuration
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080

      # PostgreSQL configuration
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sprite
      - SPRING_DATASOURCE_USERNAME=sprite_user
      - SPRING_DATASOURCE_PASSWORD=${SPRITE_DB_PASSWORD:-sprite_secret}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

      # Redis configuration
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD:-}

      # LLM Configuration (Minimax)
      - MINMAX_API_KEY=${MINMAX_API_KEY:-}

      # Owner configuration
      - SPRITE_OWNER_NAME=${OWNER_NAME:-灵锋}
      - SPRITE_OWNER_OCCUPATION=${OWNER_OCCUPATION:-软件工程师}

      # JVM tuning for containers
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC

      # Logging
      - LOGGING_LEVEL_ROOT=INFO
      - LOGGING_LEVEL_COM_LINGFENG_SPRITE=DEBUG

    volumes:
      # Mount external configuration directory
      - ./config:/app/config:ro
      # Mount data directory for persistence
      - sprite-data:/app/data
      # Mount logs directory for access
      - sprite-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sprite-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ---------------------------------------------------------------------------
  # PostgreSQL Database Service
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: sprite-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=sprite
      - POSTGRES_USER=sprite_user
      - POSTGRES_PASSWORD=${SPRITE_DB_PASSWORD:-sprite_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Initialize database with custom scripts if needed
      # - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - sprite-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprite_user -d sprite"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Redis Cache Service
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sprite-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - sprite-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

# =============================================================================
# Networks
# =============================================================================
networks:
  sprite-network:
    driver: bridge
    name: sprite-network

# =============================================================================
# Volumes (Persistent Storage)
# =============================================================================
volumes:
  postgres-data:
    name: sprite-postgres-data
  redis-data:
    name: sprite-redis-data
  sprite-data:
    name: sprite-data
  sprite-logs:
    name: sprite-logs
