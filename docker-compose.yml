services:
  neo4j:
    image: neo4j:5.25
    container_name: digital-beings-java-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/changeit-changeit
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - ./neo4j-data:/data
      - ./neo4j-logs:/logs
